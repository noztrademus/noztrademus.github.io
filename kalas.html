<!DOCTYPE html>
<html lang="sv">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CB60FSK1NV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CB60FSK1NV');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Du skickas vidare</title>
  <meta name="description" content="Sidan har flyttats. Du skickas vidare till huvudsidan." />
  <meta name="theme-color" content="#0b1020" />

  <!-- Blockera indexering -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />

  <!-- Redirect efter 3 sekunder -->
  <meta http-equiv="refresh" content="3; url=/" />

  <link rel="icon" href="images/favicon.ico" type="image/x-icon" />

  <style>
    :root {
      --bg-1: #050816;
      --bg-2: #0b1020;
      --text: #f7f8ff;
      --muted: #c5cdef;
      --accent: #f7c96f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(111, 137, 255, 0.10), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(247, 201, 111, 0.12), transparent 25%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .card {
      width: min(100%, 640px);
      padding: 32px 24px;
      text-align: center;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 3.6rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    p {
      margin: 18px auto 0;
      max-width: 520px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.55;
    }

    a {
      color: #1a1a1a;
      background: linear-gradient(180deg, #ffe09b 0%, #f7c96f 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin-top: 24px;
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 12px 24px rgba(247, 201, 111, 0.22);
    }

    a:hover,
    a:focus {
      transform: translateY(-2px);
    }
  </style>

  <script>
    window.setTimeout(function () {
      window.location.href = "/";
    }, 3000);
  </script>
</head>

<body>
  <main class="card">
    <p class="eyebrow">40 årskalas</p>
    <h1>Tack för kalaset!</h1>
    <p>
      Den här sidan användes för praktisk information inför kvällen.
      Nu skickas du vidare till huvudsidan.
    </p>
    <a href="/">Gå till huvudsidan direkt</a>
  </main>
</body>
</html>
